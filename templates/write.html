<!DOCTYPE html>
<html>
<head>
    <title>Write Journal</title>
</head>
<body>
    <h1>새 개발 일지 작성</h1>
    <form method="POST">
        <input type="text" name="title" placeholder="제목을 입력하세요" required><br><br>
        <textarea name="content" placeholder="오늘 배운 내용을 적어보세요" rows="10" cols="30" required></textarea><br><br>
        <button type="submit">등록하기</button>
    </form>
    <br>
    <a href="/">목록으로 돌아가기</a>
</body>
</html>
